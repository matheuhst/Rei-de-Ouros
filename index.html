<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07111f" />
  <title>Concurso de Beleza</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="suit-mark suit-mark-1">♦</div>
  <div class="suit-mark suit-mark-2">♦</div>
  <div class="suit-mark suit-mark-3">♦</div>
  <div class="app">
    <header class="hero">
      <p class="eyebrow">Jogo de Ouros</p>
      <h1>Concurso de Beleza</h1>
      <p class="hero-note"><span class="diamond">♦</span> Escolha um número. O alvo será 80% da média.</p>
      <button id="themeToggleBtn" type="button" class="theme-toggle" aria-pressed="false">
        Modo dark
      </button>
    </header>

    <section id="setup" class="setup-panel">
      <div class="setup-title">
        <p class="eyebrow">Entrada</p>
        <h2>Preparar partida</h2>
      </div>

      <div class="setup-grid">
        <label>
          <span>Modo</span>
          <select id="gameMode">
            <option value="solo" selected>Sozinho contra bots</option>
            <option value="local">Jogadores reais locais</option>
          </select>
        </label>

        <label>
          <span>Seu nome</span>
          <input id="mainPlayerName" type="text" maxlength="18" placeholder="Evandro" />
        </label>
      </div>

      <div id="localPlayersBox" class="local-box hidden">
        <p>Jogadores</p>
        <div class="local-grid">
          <input class="local-name" type="text" maxlength="18" placeholder="Jogador 1" />
          <input class="local-name" type="text" maxlength="18" placeholder="Jogador 2" />
          <input class="local-name" type="text" maxlength="18" placeholder="Jogador 3" />
          <input class="local-name" type="text" maxlength="18" placeholder="Jogador 4" />
          <input class="local-name" type="text" maxlength="18" placeholder="Jogador 5" />
        </div>
      </div>

      <button id="startBtn" type="button" class="btn">Iniciar</button>
    </section>

    <main id="game" class="game hidden">
      <section id="activeRulesPanel" class="active-rules-panel hidden">
        <p class="eyebrow">Regras ativas</p>
        <div id="activeRulesList" class="active-rules-list"></div>
      </section>

      <section id="choicePanel" class="choice-panel">
        <p id="roundMeta" class="eyebrow">Rodada 1</p>
        <h2 id="currentPlayerName">Mestre Jogador</h2>
        <p id="turnDescription">Digite um número de 0 a 100.</p>
        <div class="number-picker" aria-label="Escolha um número de 0 a 100">
          <input id="playerNumber" type="hidden" autocomplete="off" required />
          <div id="numberGrid" class="number-grid"></div>
        </div>

        <p id="message" class="message"></p>
      </section>

      <section id="arenaBoard" class="arena-board hidden">
        <div class="phase-head">
          <p id="phaseLabel" class="eyebrow">Sistema</p>
          <h2 id="phaseTitle">Revelando escolhas</h2>
          <p id="phaseDescription">Os números serão exibidos um por vez.</p>
        </div>

        <div id="mathLine" class="math-line hidden">
          <span id="mathExpression"></span>
          <strong id="mathResult"></strong>
        </div>

        <div id="playersBoard" class="players-board"></div>

        <button id="nextRoundBtn" type="button" class="btn next-round-btn hidden">
          Próxima rodada
        </button>
      </section>
    </main>

    <div id="endModal" class="modal hidden">
      <div class="modal-box">
        <p class="eyebrow">Fim de jogo</p>
        <h2 id="endTitle">Resultado</h2>
        <p id="endText"></p>
        <button id="playAgainBtn" type="button" class="btn">Jogar novamente</button>
      </div>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
